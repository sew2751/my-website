<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>효성초 정보부 도우미</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --mint:#5BBCB0; --mint-light:#e8f7f5; --mint-mid:#a8ddd8;
  --navy:#2C3E6B; --gray:#7a8a99; --bg:#f0f6f5; --white:#fff;
  --shadow:0 4px 20px rgba(91,188,176,0.13); --radius:16px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--navy);min-height:100vh;}

/* ── HEADER ── */
header{background:var(--white);border-bottom:2px solid var(--mint-light);height:88px;
  display:flex;align-items:center;justify-content:center;padding:0 48px;
  box-shadow:0 2px 14px rgba(91,188,176,0.09);position:sticky;top:0;z-index:100;position:relative;}
.logo{display:flex;align-items:center;gap:16px;}
.logo img{width:58px;height:58px;object-fit:contain;}
.logo-title{font-size:26px;font-weight:900;color:var(--navy);letter-spacing:-.5px;}
.logo-sub{font-size:13px;color:var(--gray);margin-top:3px;}
.header-right{position:absolute;right:48px;display:flex;align-items:center;gap:10px;}
.admin-badge{background:#F5C842;color:#7a5c00;border-radius:6px;padding:5px 11px;font-size:12px;font-weight:700;display:none;}
.login-btn{background:var(--mint-light);color:var(--mint);border:1.5px solid var(--mint-mid);
  border-radius:8px;padding:9px 20px;font-size:14px;font-weight:700;
  font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:.15s;}
.login-btn:hover{background:var(--mint-mid);}
.logout-btn{background:#fff0f0;color:#d05050;border:1.5px solid #f5c0c0;
  border-radius:8px;padding:9px 20px;font-size:14px;font-weight:700;
  font-family:'Noto Sans KR',sans-serif;cursor:pointer;display:none;}

/* ── HOME: 6 CARDS ── */
#view-home{display:flex;align-items:center;justify-content:center;padding:52px 40px;min-height:calc(100vh - 88px);}
.nav-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;width:100%;max-width:860px;}
.nav-card{background:var(--white);border-radius:20px;padding:36px 24px 30px;
  display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center;
  cursor:pointer;text-decoration:none;box-shadow:var(--shadow);border:2px solid transparent;
  transition:transform .2s,box-shadow .2s,border-color .2s;}
.nav-card:hover{transform:translateY(-6px);box-shadow:0 12px 32px rgba(91,188,176,.22);border-color:var(--mint);}
.nav-card-icon{font-size:48px;line-height:1;}
.nav-card-label{font-size:16px;font-weight:800;color:var(--navy);line-height:1.4;}
.nav-card.sos{border-color:#fdd;background:#fffafa;}
.nav-card.sos .nav-card-label{color:#c04040;}
.nav-card.sos:hover{border-color:#e07070;box-shadow:0 12px 32px rgba(220,100,100,.18);}

/* ── BOARD VIEW ── */
#view-board{display:none;padding:36px 48px 60px;max-width:1000px;margin:0 auto;}
.board-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;}
.board-back{display:flex;align-items:center;gap:8px;cursor:pointer;color:var(--mint);font-weight:700;font-size:15px;background:none;border:none;font-family:'Noto Sans KR',sans-serif;}
.board-back:hover{opacity:.75;}
.board-title-wrap{display:flex;align-items:center;gap:12px;}
.board-icon{font-size:32px;}
.board-title{font-size:24px;font-weight:900;}
.new-post-btn{background:var(--mint);color:#fff;border:none;border-radius:10px;
  padding:10px 22px;font-size:14px;font-weight:700;font-family:'Noto Sans KR',sans-serif;
  cursor:pointer;display:none;transition:.15s;}
.new-post-btn:hover{background:#48a89e;}
.admin-mode .new-post-btn{display:block;}

/* Post list */
.post-list{display:flex;flex-direction:column;gap:0;}
.post-row{background:var(--white);border:1.5px solid var(--mint-light);border-radius:12px;
  margin-bottom:10px;padding:18px 24px;display:flex;align-items:center;gap:16px;
  cursor:pointer;transition:.18s;}
.post-row:hover{border-color:var(--mint);box-shadow:0 4px 16px rgba(91,188,176,.14);transform:translateX(3px);}
.post-num{font-size:13px;color:var(--gray);width:36px;text-align:center;flex-shrink:0;}
.post-info{flex:1;min-width:0;}
.post-title-text{font-size:15px;font-weight:700;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.post-meta{font-size:12px;color:var(--gray);margin-top:4px;}
.post-thumb{width:54px;height:40px;border-radius:7px;object-fit:cover;flex-shrink:0;background:#eee;}
.post-actions{display:none;gap:6px;flex-shrink:0;}
.admin-mode .post-actions{display:flex;}
.btn-edit{background:var(--mint-light);color:var(--mint);border:none;border-radius:7px;
  padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.btn-del{background:#fff0f0;color:#d05050;border:none;border-radius:7px;
  padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.empty-msg{text-align:center;padding:60px 0;color:var(--gray);font-size:15px;}

/* ── POST VIEW ── */
#view-post{display:none;padding:36px 48px 60px;max-width:860px;margin:0 auto;}
.post-view-header{margin-bottom:28px;}
.post-view-title{font-size:24px;font-weight:900;margin-bottom:8px;}
.post-view-meta{font-size:13px;color:var(--gray);}
.post-view-body{font-size:15px;line-height:1.9;color:#3a3a3a;}
.post-view-body img{max-width:100%;border-radius:10px;margin:16px 0;display:block;}
.post-view-body .yt-wrap{position:relative;padding-bottom:56.25%;height:0;margin:16px 0;border-radius:10px;overflow:hidden;}
.post-view-body .yt-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;}
.post-view-actions{display:none;gap:10px;margin-top:28px;}
.admin-mode .post-view-actions{display:flex;}

/* ── EDITOR ── */
#view-editor{display:none;padding:36px 48px 60px;max-width:860px;margin:0 auto;}
.editor-title-input{width:100%;font-size:22px;font-weight:900;font-family:'Noto Sans KR',sans-serif;
  border:none;border-bottom:2px solid var(--mint-light);padding:10px 0;outline:none;
  color:var(--navy);background:transparent;margin-bottom:20px;}
.editor-title-input:focus{border-color:var(--mint);}
.editor-toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;padding:12px;
  background:var(--white);border:1.5px solid var(--mint-light);border-radius:10px 10px 0 0;}
.tb-btn{background:var(--mint-light);color:var(--navy);border:none;border-radius:6px;
  padding:7px 13px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:.12s;}
.tb-btn:hover{background:var(--mint);color:#fff;}
.editor-area{width:100%;min-height:360px;padding:18px;font-size:15px;line-height:1.9;
  font-family:'Noto Sans KR',sans-serif;border:1.5px solid var(--mint-light);border-top:none;
  border-radius:0 0 10px 10px;outline:none;background:var(--white);color:#3a3a3a;}
.editor-area:focus{border-color:var(--mint);}
.editor-area img{max-width:100%;border-radius:8px;margin:10px 0;}
.editor-area .yt-wrap{position:relative;padding-bottom:56.25%;height:0;margin:14px 0;border-radius:10px;overflow:hidden;}
.editor-area .yt-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;}
.editor-btns{display:flex;gap:10px;margin-top:18px;justify-content:flex-end;}
.btn-cancel{background:#f0f0f0;color:var(--gray);border:none;border-radius:10px;
  padding:11px 26px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.btn-submit{background:var(--mint);color:#fff;border:none;border-radius:10px;
  padding:11px 26px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.btn-submit:hover{background:#48a89e;}

/* ── LOGIN MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(44,62,107,.28);
  z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(3px);}
.modal-overlay.active{display:flex;}
.modal{background:#fff;border-radius:22px;padding:44px 40px;width:360px;
  box-shadow:0 20px 60px rgba(91,188,176,.18);position:relative;}
.modal h2{font-size:22px;font-weight:900;color:var(--navy);margin-bottom:6px;}
.modal p{font-size:13px;color:var(--gray);margin-bottom:24px;}
.modal input{width:100%;padding:13px 16px;border:1.5px solid var(--mint-light);border-radius:10px;
  font-size:15px;font-family:'Noto Sans KR',sans-serif;outline:none;margin-bottom:12px;transition:.15s;}
.modal input:focus{border-color:var(--mint);}
.modal-submit{width:100%;padding:14px;background:var(--mint);color:#fff;border:none;
  border-radius:10px;font-size:16px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
.modal-submit:hover{background:#48a89e;}
.modal-err{color:#e07070;font-size:13px;margin-top:8px;display:none;}
.modal-x{position:absolute;top:16px;right:18px;background:none;border:none;font-size:22px;cursor:pointer;color:var(--gray);}

/* ── YT URL MODAL ── */
#ytModal .modal{width:400px;}
#imgInput{display:none;}
</style>
</head>

  ],
  edu:[

let db={};
// Load from localStorage or seed
for(const k of Object.keys(BOARDS)){
  const saved=localStorage.getItem('posts_'+k);
  db[k]=saved?JSON.parse(saved):(defaultPosts[k]||[]);
}
function save(board){localStorage.setItem('posts_'+board,JSON.stringify(db[board]));}

// ── VIEWS ──
function show(id){['view-home','view-board','view-post','view-editor'].forEach(v=>document.getElementById(v).style.display='none');document.getElementById(id).style.display='block';}
function goHome(){show('view-home');}

// ── BOARD ──
function openBoard(boardId){
  currentBoard=boardId;
  const b=BOARDS[boardId];
  document.getElementById('boardIcon').textContent=b.icon;
  document.getElementById('boardTitle').textContent=b.title;
  renderPostList();
  show('view-board');
}
function renderPostList(){
  const list=document.getElementById('postList');
  const posts=db[currentBoard]||[];
  if(!posts.length){list.innerHTML='<div class="empty-msg">아직 작성된 글이 없습니다.<br>관리자가 로그인하면 글을 추가할 수 있습니다.</div>';return;}
  list.innerHTML=posts.map((p,i)=>{
    const thumb=extractThumb(p.body);
    const preview=stripHtml(p.body).slice(0,60)+'...';
    return `<div class="post-row" onclick="openPost('${p.id}')">
      <span class="post-num">${posts.length-i}</span>
      <div class="post-info">
        <div class="post-title-text">${escHtml(p.title)}</div>
        <div class="post-meta">${p.date} &nbsp;·&nbsp; ${preview}</div>
      </div>
      ${thumb?`<img class="post-thumb" src="${thumb}" alt="">`:''}
      <div class="post-actions" onclick="event.stopPropagation()">
        <button class="btn-edit" onclick="openEditor('${p.id}')">✏️ 수정</button>
        <button class="btn-del" onclick="deletePost('${p.id}')">🗑 삭제</button>
      </div>
    </div>`;
  }).join('');
  if(isAdmin) document.getElementById('postList').parentElement.classList.add('admin-mode');
}

// ── POST VIEW ──
function openPost(postId){
  const p=db[currentBoard].find(x=>x.id===postId);
  if(!p)return;
  currentPostId=postId;
  document.getElementById('postViewTitle').textContent=p.title;
  document.getElementById('postViewMeta').textContent=p.date;
  document.getElementById('postViewBody').innerHTML=p.body;
  document.getElementById('postBackBtn').onclick=()=>openBoard(currentBoard);
  const actions=document.getElementById('postViewActions');
  if(isAdmin)actions.style.display='flex'; else actions.style.display='none';
  show('view-post');
}
function editCurrentPost(){openEditor(currentPostId);}
function deleteCurrentPost(){deletePost(currentPostId);openBoard(currentBoard);}
function deletePost(postId){
  if(!confirm('이 글을 삭제할까요?'))return;
  db[currentBoard]=db[currentBoard].filter(p=>p.id!==postId);
  save(currentBoard);
  renderPostList();
}

// ── EDITOR ──
function openEditor(postId){
  editingPostId=postId;
  const isEdit=postId!==null;
  document.getElementById('editorHeading').textContent=isEdit?'글 수정':'새 글 작성';
  document.getElementById('editorBackBtn').onclick=()=>isEdit?openPost(postId):openBoard(currentBoard);
  document.getElementById('editorCancelBtn').onclick=()=>isEdit?openPost(postId):openBoard(currentBoard);
  if(isEdit){
    const p=db[currentBoard].find(x=>x.id===postId);
    document.getElementById('editorTitle').value=p.title;
    document.getElementById('editorArea').innerHTML=p.body;
  } else {
    document.getElementById('editorTitle').value='';
    document.getElementById('editorArea').innerHTML='';
  }
  show('view-editor');
  document.getElementById('editorTitle').focus();
}
function submitPost(){
  const title=document.getElementById('editorTitle').value.trim();
  const body=document.getElementById('editorArea').innerHTML.trim();
  if(!title){alert('제목을 입력해주세요.');return;}
  if(!body||body==='<br>'){alert('내용을 입력해주세요.');return;}
  const today=new Date().toISOString().slice(0,10);
  if(editingPostId){
    const p=db[currentBoard].find(x=>x.id===editingPostId);
    p.title=title; p.body=body; p.date=today;
  } else {
    db[currentBoard].unshift({id:currentBoard+'_'+Date.now(),title,body,date:today});
  }
  save(currentBoard);
  openBoard(currentBoard);
}

// ── TOOLBAR ──
function fmtBold(){document.execCommand('bold');}
function fmtItalic(){document.execCommand('italic');}
function fmtHr(){document.execCommand('insertHTML','',`<hr style="border:none;border-top:1.5px solid #a8ddd8;margin:18px 0;">`);}
function insertImgBtn(){document.getElementById('imgInput').click();}
function handleImageUpload(e){
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    document.getElementById('editorArea').focus();
    document.execCommand('insertHTML','',`<img src="${ev.target.result}" style="max-width:100%;border-radius:8px;margin:10px 0;">`);
  };
  reader.readAsDataURL(file);
  e.target.value='';
}
function openYtModal(){document.getElementById('ytModal').classList.add('active');document.getElementById('ytUrl').value='';}
function closeYtModal(){document.getElementById('ytModal').classList.remove('active');}
function insertYoutube(){
  const url=document.getElementById('ytUrl').value.trim();
  const vid=extractYtId(url);
  if(!vid){alert('올바른 유튜브 URL을 입력해주세요.');return;}
  const html=`<div class="yt-wrap"><iframe src="https://www.youtube.com/embed/${vid}" allowfullscreen></iframe></div>`;
  document.getElementById('editorArea').focus();
  document.execCommand('insertHTML','',html);
  closeYtModal();
}
function extractYtId(url){
  const m=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&
?#]+)/);
  return m?m[1]:null;
}

// ── AUTH ──
function openLogin(){
  document.getElementById('loginModal').classList.add('active');
  document.getElementById('loginErr').style.display='none';
  document.getElementById('loginId').value='';
  document.getElementById('loginPw').value='';
  setTimeout(()=>document.getElementById('loginId').focus(),100);
}
function closeLogin(){document.getElementById('loginModal').classList.remove('active');}
document.getElementById('loginModal').addEventListener('click',e=>{if(e.target===document.getElementById('loginModal'))closeLogin();});
document.getElementById('ytModal').addEventListener('click',e=>{if(e.target===document.getElementById('ytModal'))closeYtModal();});

function doLogin(){
  const id=document.getElementById('loginId').value.trim();
  const pw=document.getElementById('loginPw').value;
  if(id===ADMIN_ID&&pw===ADMIN_PW){
    isAdmin=true; closeLogin();
    document.getElementById('loginBtn').style.display='none';
    document.getElementById('logoutBtn').style.display='block';
    document.getElementById('adminBadge').style.display='inline-block';
    document.body.classList.add('admin-mode');
    if(currentBoard) renderPostList();
  } else {
    document.getElementById('loginErr').style.display='block';
  }
}
function doLogout(){
  isAdmin=false;
  document.getElementById('loginBtn').style.display='block';
  document.getElementById('logoutBtn').style.display='none';
  document.getElementById('adminBadge').style.display='none';
  document.body.classList.remove('admin-mode');
  if(currentBoard) renderPostList();
  const actions=document.getElementById('postViewActions');
  if(actions) actions.style.display='none';
}

// ── UTILS ──
function extractThumb(html){
  const m=html.match(/src="([^"]+)"/);
  if(m&&!m[1].startsWith('https://www.youtube'))return m[1];
  const yt=html.match(/embed\/([^"?]+)/);
  if(yt)return `https://img.youtube.com/vi/${yt[1]}/mqdefault.jpg`;
  return null;
}
function stripHtml(html){return html.replace(/<[^>]*>/g,'');}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
